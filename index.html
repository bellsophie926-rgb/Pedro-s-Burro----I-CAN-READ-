    &lt;style&gt;
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&amp;display=swap');
        
        :root {
            --primary: #d97706;
            --primary-light: #fef3c7;
            --bg: #fdf6e3;
            --text: #5c4033;
            --accent: #b45309;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        .flashcard-container {
            perspective: 1000px;
            height: 220px;
        }
        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            border: 1px solid #fef3c7;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .flashcard-front {
            background-color: white;
        }
        .flashcard-back {
            background-color: #fffbeb;
            transform: rotateY(180deg);
            padding: 1rem;
        }
        .flashcard-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 0.5rem;
        }
        .phonics-mark {
            border-bottom: 2px solid var(--accent);
            display: inline-block;
            line-height: 1;
        }

        .speaker-btn {
            background-color: var(--primary-light);
            color: var(--accent);
            padding: 0.5rem;
            border-radius: 9999px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }
        .speaker-btn:hover {
            background-color: var(--primary);
            color: white;
            transform: scale(1.1);
        }
        .speaker-btn svg {
            width: 20px;
            height: 20px;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(180, 83, 9, 0.15);
        }

        .tab-active {
            background-color: var(--primary);
            color: white;
        }

        .btn-play {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            transition: transform 0.2s;
        }
        .btn-play:active {
            transform: scale(0.95);
        }

        .fade-in {
            opacity: 0;
        }
    &lt;/style&gt;

            { en: &quot;b&lt;span class='phonics-mark'&gt;as&lt;/span&gt;ket&quot;, zh: &quot;篮子&quot;, audio: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/5MwvMy92teaBDQwpDPa8Z3.mp3&quot;, img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/yTk9GfuoLtrNFsD3NrKD8c.jpg&quot; },
            { en: &quot;l&lt;span class='phonics-mark'&gt;i&lt;/span&gt;ck&quot;, zh: &quot;舔&quot;, audio: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/rRFcvhQeMZga8BuEenNQna.mp3&quot;, img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/Z2JgQMqneCK7VHBgLinnsa.jpg&quot; },
            { en: &quot;ch&lt;span class='phonics-mark'&gt;ee&lt;/span&gt;k&quot;, zh: &quot;脸颊&quot;, audio: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/PUMzEgHwAoy6QFbY6g52EX.mp3&quot;, img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/VAHjR6h53qqs3Fn5L3bJLL.jpg&quot; },
            { en: &quot;f&lt;span class='phonics-mark'&gt;ou&lt;/span&gt;nd&quot;, zh: &quot;发现/找到&quot;, audio: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/pRKnbdjTXZpyQT5D6aVu5n.mp3&quot;, img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/JmZdnan25BnL4BRSaa2bWV.jpg&quot; },
            { en: &quot;n&lt;span class='phonics-mark'&gt;ew&lt;/span&gt;&quot;, zh: &quot;新的&quot;, audio: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/dRRFPXY9XdQmRtXTkXncGE.mp3&quot;, img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/f6oG6XXCrv5JQ5aDTNxfVh.jpg&quot; }
        ];

        const storyData = [
            {
                text: &quot;Pedro and Papa went to the market. It was a sunny day. They were ready to find a new burro.&quot;,
                img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/sBBxW29vgdxRvSdqMG9RZk.jpg&quot;,
                vocab: [&quot;went&quot;, &quot;market&quot;, &quot;sunny&quot;, &quot;ready&quot;, &quot;find&quot;, &quot;new&quot;, &quot;burro&quot;]
            },
            {
                text: &quot;There were many burros at the market. Some were big and some were little. Pedro saw a burro with a cart.&quot;,
                img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/6TRK2we2LyKDkwfrcMuQcS.jpg&quot;,
                vocab: [&quot;there were&quot;, &quot;little&quot;, &quot;saw&quot;, &quot;cart&quot;]
            },
            {
                text: &quot;Look at this burro, Papa! It can pull a heavy cart. It is very strong.&quot;,
                img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/g2v3LiJpu6a7VeH8Q5y63M.jpg&quot;,
                vocab: [&quot;pull&quot;, &quot;cart&quot;]
            },
            {
                text: &quot;How about this one? It can carry two big jugs of water. It must be a good worker.&quot;,
                img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/wQzaDm7FNnYvtWVgauKPZj.jpg&quot;,
                vocab: [&quot;how about&quot;, &quot;carry&quot;, &quot;jug&quot;, &quot;must&quot;]
            },
            {
                text: &quot;Suddenly, a little burro felt hungry. It gave a tug on Pedro's shirt! Pedro felt surprised.&quot;,
                img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/BHqbu3sMBGLxCUyB2Vc7B2.jpg&quot;,
                vocab: [&quot;felt&quot;, &quot;tug&quot;, &quot;shirt&quot;]
            },
            {
                text: &quot;The burro picked up a basket. It licked Pedro's cheek! 'I found my new burro!' said Pedro.&quot;,
                img: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/bveAFUK7Zb2qiQG8D7sz5S.jpg&quot;,
                vocab: [&quot;pick up&quot;, &quot;basket&quot;, &quot;lick&quot;, &quot;cheek&quot;, &quot;found&quot;, &quot;new&quot;]
            }
        ];

        let currentPage = 0;

        function initVocab() {
            const hfContainer = document.getElementById('hf-words-container');
            hfContainer.innerHTML = hfWords.map(item =&gt; `
                &lt;div class=&quot;bg-white p-4 rounded-2xl border border-amber-100 card-hover text-center cursor-pointer flex flex-col items-center gap-2&quot; onclick=&quot;playWord('${item.word}')&quot;&gt;
                    &lt;span class=&quot;text-xl font-medium&quot;&gt;${item.word}&lt;/span&gt;
                    &lt;div class=&quot;speaker-btn&quot;&gt;
                        &lt;svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;&gt;&lt;polygon points=&quot;11 5 6 9 2 9 2 15 6 15 11 19 11 5&quot;&gt;&lt;/polygon&gt;&lt;path d=&quot;M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.08&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            `).join('');

            const newContainer = document.getElementById('new-words-container');
            newContainer.innerHTML = newWords.map((item, index) =&gt; `
                &lt;div class=&quot;flashcard-container&quot;&gt;
                    &lt;div class=&quot;flashcard&quot; id=&quot;card-${index}&quot; onclick=&quot;toggleCard(${index})&quot;&gt;
                        &lt;div class=&quot;flashcard-front&quot;&gt;
                            &lt;div class=&quot;text-2xl font-bold text-accent mb-4&quot;&gt;${item.en}&lt;/div&gt;
                            &lt;button class=&quot;speaker-btn&quot; onclick=&quot;event.stopPropagation(); playAudio('${item.audio}')&quot;&gt;
                                &lt;svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;&gt;&lt;polygon points=&quot;11 5 6 9 2 9 2 15 6 15 11 19 11 5&quot;&gt;&lt;/polygon&gt;&lt;path d=&quot;M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.08&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
                            &lt;/button&gt;
                            &lt;div class=&quot;mt-4 text-gray-400 text-xs&quot;&gt;点击卡片翻转&lt;/div&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;flashcard-back&quot;&gt;
                            ${item.img ? `&lt;img src=&quot;${item.img}&quot; class=&quot;flashcard-img&quot; alt=&quot;${item.en}&quot;&gt;` : ''}
                            &lt;div class=&quot;text-xl font-bold text-accent&quot;&gt;${item.zh}&lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            `).join('');
        }

        function toggleCard(index) {
            const card = document.getElementById(`card-${index}`);
            card.classList.toggle('is-flipped');
        }

        function switchTab(tab) {
            const vocabSec = document.getElementById('section-vocab');
            const readingSec = document.getElementById('section-reading');
            const vocabTab = document.getElementById('tab-vocab');
            const readingTab = document.getElementById('tab-reading');

            if (tab === 'vocab') {
                vocabSec.classList.remove('hidden');
                readingSec.classList.add('hidden');
                vocabTab.classList.add('tab-active');
                vocabTab.classList.remove('text-gray-500');
                readingTab.classList.remove('tab-active');
                readingTab.classList.add('text-gray-500');
            } else {
                vocabSec.classList.add('hidden');
                readingSec.classList.remove('hidden');
                readingTab.classList.add('tab-active');
                readingTab.classList.remove('text-gray-500');
                vocabTab.classList.remove('tab-active');
                vocabTab.classList.add('text-gray-500');
                updatePage();
            }
        }

        function updatePage() {
            const data = storyData[currentPage];
            const img = document.getElementById('book-image');
            const text = document.getElementById('book-text');
            const pageNum = document.getElementById('page-num');
            const vocabList = document.getElementById('page-vocab-list');

            img.style.opacity = 0;
            setTimeout(() =&gt; {
                img.src = data.img;
                img.style.opacity = 1;
            }, 300);

            text.innerText = data.text;
            pageNum.innerText = currentPage + 1;

            vocabList.innerHTML = data.vocab.map(v =&gt; {
                const wordInfo = newWords.find(item =&gt; item.en.replace(/&lt;[^&gt;]+&gt;/g, '') === v) || { en: v, zh: &quot;&quot;, audio: &quot;&quot; };
                return `
                    &lt;div class=&quot;bg-white p-3 rounded-xl border border-amber-100 shadow-sm cursor-pointer hover:bg-amber-50 transition-colors&quot; onclick=&quot;playWord('${v}')&quot;&gt;
                        &lt;div class=&quot;font-bold text-accent&quot;&gt;${wordInfo.en}&lt;/div&gt;
                        &lt;div class=&quot;text-xs text-gray-400&quot;&gt;${wordInfo.zh}&lt;/div&gt;
                    &lt;/div&gt;
                `;
            }).join('');

            anime({
                targets: '#book-text',
                translateY: [20, 0],
                opacity: [0, 1],
                duration: 800,
                easing: 'easeOutExpo'
            });
        }

        function nextPage() {
            if (currentPage &lt; storyData.length - 1) {
                currentPage++;
                updatePage();
            }
        }

        function prevPage() {
            if (currentPage &gt; 0) {
                currentPage--;
                updatePage();
            }
        }

        function playAudio(url) {
            if (!url) return;
            const audio = new Audio(url);
            audio.play();
        }

        function playWord(word) {
            const cleanWord = word.replace(/&lt;[^&gt;]+&gt;/g, '');
            // 优先从高频词中找音频
            const hfObj = hfWords.find(item =&gt; item.word === cleanWord);
            if (hfObj &amp;&amp; hfObj.audio) {
                playAudio(hfObj.audio);
                return;
            }
            // 再从生词中找
            const wordObj = newWords.find(item =&gt; item.en.replace(/&lt;[^&gt;]+&gt;/g, '') === cleanWord);
            if (wordObj &amp;&amp; wordObj.audio) {
                playAudio(wordObj.audio);
            } else {
                const utterance = new SpeechSynthesisUtterance(cleanWord);
                utterance.lang = 'en-GB';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }

        function playCurrentPage() {
            const text = storyData[currentPage].text;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        window.onload = () =&gt; {
            initVocab();
            anime({
                targets: 'header',
                translateY: [-50, 0],
                opacity: [0, 1],
                duration: 1000,
                easing: 'easeOutExpo'
            });
        };

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
